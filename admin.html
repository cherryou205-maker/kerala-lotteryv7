<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerala Lottery Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1518546305927-5a555bb7020d?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
overflow:hidden;
}

.card{
width:350px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:20px;
padding:35px 30px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
color:#fff;
animation:fade 0.5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
color:#25D366;
}

.sub{
text-align:center;
font-size:14px;
opacity:0.8;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.12);
color:#fff;
font-size:15px;
outline:none;
transition:0.3s;
}

input::placeholder{
color:#ddd;
}

input:focus{
background:rgba(255,255,255,0.18);
transform:scale(1.02);
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
background:#25D366;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(37,211,102,0.4);
}

#error{
margin-top:15px;
color:#ff4d4d;
text-align:center;
font-size:14px;
}

#msg{
margin-top:15px;
color:#00ff99;
text-align:center;
font-size:14px;
}

#adminPanel{
display:none;
}

.status{
margin-top:20px;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,0.08);
font-size:14px;
text-align:center;
}

</style>

</head>
<body>

<div class="card">

<div class="logo">KERALA ADMIN</div>
<div class="sub">Secure WhatsApp Control Panel</div>

<!-- LOGIN -->

<div id="loginBox">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">LOGIN</button>

<div id="error"></div>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel">

<input type="text" id="wa" placeholder="Enter WhatsApp Number">

<button onclick="saveWA()">UPDATE NUMBER</button>

<div id="msg"></div>

<div class="status">
🟢 Secure Control Panel
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyDi0DhAo5g9iYQQ0d4AHyMu7Y5ZJGMHBXg",

authDomain: "kerela-lottery-v7.firebaseapp.com",

databaseURL: "https://kerela-lottery-v7-default-rtdb.firebaseio.com",

projectId: "kerela-lottery-v7",

storageBucket: "kerela-lottery-v7.firebasestorage.app",

messagingSenderId: "476358443982",

appId: "1:476358443982:web:901c1acf5a2c2c43e6219f",

measurementId: "G-F9MWWTM7W5"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* PASSWORD */

const ADMIN_PASSWORD = "12345";

/* LOGIN FUNCTION */

window.login = function(){

const pass = document.getElementById('password').value.trim();

if(pass === ADMIN_PASSWORD){

document.getElementById('loginBox').style.display = "none";

document.getElementById('adminPanel').style.display = "block";

}else{

document.getElementById('error').innerHTML = "Wrong Password";

}

}

/* SAVE WHATSAPP NUMBER */

window.saveWA = function(){

const number = document.getElementById('wa').value.trim();

if(number === ""){

alert("Enter WhatsApp Number");

return;

}

set(ref(db,"site/whatsapp"), number)

.then(()=>{

document.getElementById('msg').innerHTML =
"✅ WhatsApp Number Updated Successfully";

console.log("Saved:", number);

})

.catch((error)=>{

alert(error);

});

}

</script>

</body>
</html>
